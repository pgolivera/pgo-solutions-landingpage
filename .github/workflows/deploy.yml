# =============================================================================
# Deploy to AWS — S3 + CloudFront
# =============================================================================
#
# STATUS: TEMPLATE — ready to activate, not running yet.
#
# BEFORE ACTIVATING:
#   1. Create AWS resources (see checklist below)
#   2. Fill in the three TODO values in the `env:` block
#   3. Add two secrets in GitHub → Settings → Secrets and variables → Actions:
#        AWS_ACCESS_KEY_ID
#        AWS_SECRET_ACCESS_KEY
#   4. Remove the `if: false` line from the deploy job
#
# AWS RESOURCES CHECKLIST:
#   [ ] S3 bucket — static website hosting enabled, public access allowed
#   [ ] Bucket policy — allows CloudFront to read objects (OAC recommended)
#   [ ] CloudFront distribution — origin: S3 bucket, default root: index.html
#   [ ] Custom error page in CloudFront: 404 → /404.html (for Next.js routing)
#   [ ] ACM certificate — us-east-1 region (required by CloudFront), validated
#   [ ] CloudFront alternate domain — point to your custom domain
#   [ ] IAM user — attach policy: AmazonS3FullAccess + CloudFrontFullAccess
#       (or a scoped policy — see docs/aws-iam-policy.json when created)
# =============================================================================

name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1                 # TODO: set your region
  S3_BUCKET: your-bucket-name           # TODO: replace with your S3 bucket name
  CLOUDFRONT_DISTRIBUTION_ID: ""        # TODO: replace with your CloudFront distribution ID

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: false # TODO: remove this line when ready to activate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check & lint
        run: yarn typecheck && yarn lint

      - name: Build (static export → out/)
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Assets (JS/CSS/images): long-lived cache — fingerprinted filenames ensure freshness
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          # HTML files: no cache — always fetch latest
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --exclude "*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
